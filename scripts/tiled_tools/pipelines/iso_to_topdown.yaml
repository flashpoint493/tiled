# Iso 45° 贴图 -> Topdown 视角（topdown_to_iso 的几何逆）
#
# 用法（web）: 上传 → 选 workflow → ▶ 运行
# 用法（CLI）: python -m tiled_tools run iso_to_topdown \
#                -v input=res/iso.png -v output=output/topdown.png

name: iso_to_topdown
description: 把 iso 45° 视角的贴图反向还原成 topdown 视角

steps:
  - action: load
    params:
      path: ${input}

  - action: iso_to_topdown
    params:
      y_scale: 2.0            # dimetric 反算；60° 真等距改 1.7321
      angle: -45              # 与正向 +45 对称
      resample: bicubic       # 像素风改 nearest
      trim: true              # 裁掉旋转后产生的透明边
      pad_before_scale: 0     # 输入紧贴画布边缘时设 > 0（如 8 / 16）

  - action: save
    params:
      path: ${output:auto}
