# 3x3 循环 tile 拆 9 张 → 每张分别 topdown→iso → 批量保存
#
# 用法（web）: 上传 → 选 workflow → ▶ 运行
# 用法（CLI）: python -m tiled_tools run pipelines/3x3_split_then_iso.yaml \
#                -v input=res/grass.png -v output_dir=output -v prefix=grass

name: 3x3_split_then_iso
description: 把 3x3 循环 tile 拆成 9 张，每张做 topdown→iso，再批量保存

steps:
  - action: load
    params:
      path: ${input}

  - action: split_3x3
    params:
      mode: equal

  - action: for_each
    params:
      source: tiles
      steps:
        - action: topdown_to_iso
          params:
            anchor: center        # 地面 tile 用 center；人物用 bottom-center
            angle: 45
            y_scale: 0.5
            resample: bicubic
            trim: false           # 批量场景一般保画布，避免 9 张尺寸不一

  - action: save_all
    params:
      # 默认 "auto"：server 自动分配独立子目录；CLI 可用 -v output_dir=output/iso
      dir: ${output_dir:auto}
      # 默认空字符串：save_all 会回退用 source_path.stem 当前缀
      prefix: ${prefix:}
      pattern: "{prefix}_iso_{name}.png"
