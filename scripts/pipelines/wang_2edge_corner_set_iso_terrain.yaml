name: wang_2edge_corner_set_iso_terrain
description: |
  同时生成完整 Edge Set + Corner Set 的 Tiled Isometric Terrain tileset。

  输入仍然是两张四方连续贴图（foreground/background）。工具会生成：
    - 16 张 Edge Set tile（code: N/E/S/W）
    - 16 张 Corner Set tile（code: TL/TR/BR/BL）

  最终 sheet 是 8×4、共 32 格；每格跟随 iso45_tile_spec（默认 256×256），内部 grid 默认是 256×128 isometric。


  .tsx 会自动写入两个 wangset：type="edge" 和 type="corner"。

steps:
  # ---- 同时生成 edge + corner 两套几何蒙版 ----
  - action: gen_default_masks
    params:
      size: ${tile_size:32}
      half_extent: 0.5
      mode: both

  # ---- 用两张底图按蒙版混合，得到 32 张 tile ----
  - action: mask_blend_set
    params:
      foreground: ${fg}
      background: ${bg}
      resample: ${resample:nearest}
      expected: 32

  # ---- 用一个下拉预设控制最终规格：cell=N×N，grid=N×N/2，tileoffset.y=N/4 ----
  - action: iso45_tile_spec
    params:
      preset: ${spec:256}

  # ---- 每张 tile 转成 iso footprint，再放进所选规格的 cell ----
  - action: for_each
    params:
      source: tiles
      steps:
        - action: iso45_fit_tile
          params:
            preset: context
            anchor: ${anchor:center}
            resample: ${resample:bicubic}
            background: [0, 0, 0, 0]


  # ---- 拼成 8×4 sheet：前 16 格 edge，后 16 格 corner ----
  - action: pack_sheet
    params:
      columns: 8
      spacing: 0
      margin: 0
      path: ${output:auto}

  # ---- 生成带 isometric grid、tileoffset、Edge Set + Corner Set 的 .tsx ----
  - action: build_tsx_sheet
    params:
      path: ${tsx:auto}
      name: ${name:wang_2edge_corner_iso_terrain}
      tile_names: true
      terrain_spec: context

      wang_2edge: true

      wang_2corner: true
      edge_offset: 0
      corner_offset: 16
      wangset_name: ${edge_wangset_name:edge_set}
      corner_wangset_name: ${corner_wangset_name:corner_set}
      background_name: ${background_name:background}
      foreground_name: ${foreground_name:foreground}
      wang_transform: iso45_ccw


