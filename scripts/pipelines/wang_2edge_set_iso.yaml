name: wang_2edge_set_iso
description: |
  Wang 2-edge tile set 的 isometric 45° 版本：和 wang_2edge_set 一样从两张
  四方连续底图（如 sand + water）+ 16 张蒙版生成过渡 tile，但每张 tile
  会被 iso 化成菱形并标准化到指定尺寸的正方形画布。

  默认产物：4×4 sheet，每格 96×96 画布（菱形宽 96 高 48 居中，上下各 24px
  透明边），对应 Tiled isometric 地图模式的 `tilewidth=96 tileheight=48`
  约定。要换尺寸只改 ${target} 变量即可。

  适合用作：
    - iso 视角游戏的过渡素材（地面、河岸）
    - 角色/物件 iso 视图的地形垫底
    - 美术 mock-up

  注意：默认产物 tsx orientation 是普通方块。要用作真正的 Tiled isometric
  地图 tileset：Edit Tileset → Orientation 改为 Isometric，
  Tile Width/Height 改为 ${target} / ${target}/2（如 96 / 48）。

steps:
  # ---- A. 生成几何蒙版（验证用） ----
  - action: gen_default_masks
    params:
      size: ${tile_size:32}
      half_extent: 0.5

  # ---- B. 自有蒙版目录（量产）：取消注释，并删掉 A
  # - action: load_dir
  #   params:
  #     path: ${mask_dir}
  #     pattern: "mask_*.png"
  #     limit: 16

  # ---- 用两张底图按蒙版混合 ----
  - action: mask_blend_set
    params:
      foreground: ${fg}
      background: ${bg}
      resample: ${resample:nearest}

  # ---- 对每张 tile 做 iso 化 + 标准化到 target × target 画布 ----
  # 三步：
  #   1) topdown_to_iso  trim=false 让 16 张产出形状一致（46x23 当输入是 32 时）
  #   2) scale           按 sx=target/W 等比拉伸到 target × target/2（保持菱形 2:1）
  #   3) square_canvas   上下补透明边到 target × target（Tiled iso 标准画布）
  #
  # 不直接给 scale 写 size:[w,h] 是因为 YAML flow style 里嵌 ${...} 会让
  # 解析器误判；用 sx/sy 配合 target 变量更安全。target/half_target 由用户
  # 显式给出（默认 96/48），互相约定 half_target == target/2。
  - action: for_each
    params:
      source: tiles
      steps:
        - action: topdown_to_iso
          params:
            anchor: center
            angle: 45
            y_scale: 0.5
            resample: ${resample:bicubic}
            trim: false
        - action: scale
          params:
            size:
              - ${target:96}
              - ${half_target:48}
            resample: ${resample:bicubic}
        - action: square_canvas
          params:
            size: ${target:96}
            # 菱形向下对齐：贴底部正中，上方留 ${target}-${half_target} 透明像素。
            # 这是 iso 游戏的常规约定——菱形作为地面 footprint 居底，
            # 上方留白给角色立绘 / 高物体（树、塔楼）伸展空间。
            # 想改回居中：anchor: center
            anchor: ${anchor:bottom-center}
            background: [0, 0, 0, 0]

  # ---- 拼 4×4 sheet ----
  - action: pack_sheet
    params:
      columns: 4
      spacing: 0
      margin: 0
      path: ${output:auto}

  # ---- 生成 Tiled .tsx（自动写入 Edge Set，不需要手工逐格标边） ----
  - action: build_tsx_sheet
    params:
      name: ${name:wang_2edge_iso}
      tile_names: true
      wang_2edge: true
      wangset_name: ${wangset_name:wang_2edge_iso}
      background_name: ${background_name:background}
      foreground_name: ${foreground_name:foreground}
      wang_transform: iso45_ccw


