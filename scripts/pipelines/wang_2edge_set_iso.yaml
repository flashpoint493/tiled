name: wang_2edge_set_iso
description: |
  Wang 2-edge tile set 的 isometric 45° 版本：和 wang_2edge_set 一样从两张
  四方连续底图（如 sand + water）+ 16 张蒙版生成过渡 tile，但每张 tile
  会被 iso 化成菱形并标准化到指定尺寸的正方形画布。

  默认产物：4×4 sheet，每格 256×256 画布（菱形宽 256 高 128 居中，上下各 64px
  透明边），对应 Tiled isometric 地图模式的 `tilewidth=256 tileheight=128`

  约定。要换尺寸只改 `iso45_tile_spec.preset`（Web 下拉）或 CLI 变量 `-v spec=128/256/512`。


  适合用作：
    - iso 视角游戏的过渡素材（地面、河岸）
    - 角色/物件 iso 视图的地形垫底
    - 美术 mock-up

  注意：默认产物 tsx orientation 是普通方块。要用作真正的 Tiled isometric
  地图 tileset：Edit Tileset → Orientation 改为 Isometric，
  Tile Width/Height 改为所选规格 N / N/2（默认 256 / 128）。



steps:
  # ---- A. 生成几何蒙版（验证用） ----
  - action: gen_default_masks
    params:
      size: ${tile_size:32}
      half_extent: 0.5

  # ---- B. 自有蒙版目录（量产）：取消注释，并删掉 A
  # - action: load_dir
  #   params:
  #     path: ${mask_dir}
  #     pattern: "mask_*.png"
  #     limit: 16

  # ---- 用两张底图按蒙版混合 ----
  - action: mask_blend_set
    params:
      foreground: ${fg}
      background: ${bg}
      resample: ${resample:nearest}

  # ---- 用一个下拉预设控制最终规格：cell=N×N，footprint=N×N/2 ----
  - action: iso45_tile_spec
    params:
      preset: ${spec:256}

  # ---- 对每张 tile 做 iso 化 + 标准化到所选规格的 cell ----
  - action: for_each
    params:
      source: tiles
      steps:
        - action: iso45_fit_tile
          params:
            preset: context
            # 菱形向下对齐：贴底部正中，上方留透明像素给立绘 / 高物体。
            # 想改回居中：anchor: center
            anchor: ${anchor:bottom-center}
            resample: ${resample:bicubic}
            background: [0, 0, 0, 0]


  # ---- 拼 4×4 sheet ----
  - action: pack_sheet
    params:
      columns: 4
      spacing: 0
      margin: 0
      path: ${output:auto}

  # ---- 生成 Tiled .tsx（自动写入 Edge Set，不需要手工逐格标边） ----
  - action: build_tsx_sheet
    params:
      name: ${name:wang_2edge_iso}
      tile_names: true
      wang_2edge: true
      wangset_name: ${wangset_name:wang_2edge_iso}
      background_name: ${background_name:background}
      foreground_name: ${foreground_name:foreground}
      wang_transform: iso45_ccw



